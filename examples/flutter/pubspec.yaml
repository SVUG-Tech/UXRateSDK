name: flutter_uxrate_example
description: Demo app for the flutter_uxrate plugin — shows how to integrate UXRate AI-powered surveys in a Flutter iOS app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_uxrate: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
