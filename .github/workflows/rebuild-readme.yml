name: Rebuild README

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/rebuild-readme.sh'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild README from docs
        run: bash scripts/rebuild-readme.sh

      - name: Commit if changed
        run: |
          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: rebuild README from docs/"
          git push
